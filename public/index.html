<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Track | Carbon Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="kalkulator-container">
        <h1>Kalkulator Emisi Karbon</h1>
        <div class="grup-input">
            <h3>Transportasi</h3>

            <label>Jarak Tempuh (km):</label>
            <input type="number" id="input-jarak" min="0" oninput="this.value = Math.abs(this.value)" placeholder="contoh: 5">

            <label>Jenis Kendaraan:</label>
            <select id="input-kendaraan">
                <option value="0.1">Motor</option>
                <option value="0.2">Mobil</option>
            </select>
        </div>
        <div class="grup-input">
            <h3>Energi</h3>

            <label>Penggunaan AC (jam):</label>
            <input type="number" id="input-ac" min="0" oninput="this.value = Math.abs(this.value)" placeholder="Contoh: 3">

            <label>Penggunaan Laptop (jam):</label>
            <input type="number" id="input-laptop" min="0" oninput="this.value = Math.abs(this.value)" placeholder="Contoh: 5">
        </div>
            <button id="tombol-hitung">Hitung Emisi</button>
            <button id="tombol-reset">Reset Data</button>

        <div id="area-hasil">
            <h2>Total Emisi: <span id="angka-hasil">0</span> kg CO₂</h2>
        </div>

        <div class="tips-container">
            <h3>Aksi Nyata Kurangi Emisi</h3>
            
            <div class="checklist-item">
                <input type="checkbox" id="tip-1" class="tip-checkbox">
                <label for="tip-1">Jalan kaki untuk jarak dekat</label>
            </div>
            <div class="checklist-item">
                <input type="checkbox" id="tip-2" class="tip-checkbox">
                <label for="tip-2">Matikan AC jika ruangan tidak digunakan</label>
            </div>
            <div class="checklist-item">
                <input type="checkbox" id="tip-3" class="tip-checkbox">
                <label for="tip-3">Cabut charger jika sudah tidak dipakai</label>
            </div>
            <div class="checklist-item">
                <input type="checkbox" id="tip-4" class="tip-checkbox">
                <label for="tip-4">Gunakan transportasi umum</label>
            </div>
            <div class="checklist-item">
                <input type="checkbox" id="tip-5" class="tip-checkbox">
                <label for="tip-5">Membawa tumbler/botol air</label>
            </div>

            <div class="pesan-motivasi">
                <p id="teks-motivasi">Ayo mulai lakukan aksi nyata untuk bumi kita!</p>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
